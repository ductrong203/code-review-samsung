version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: codereview-backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    restart: unless-stopped
    networks:
      - codereview-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: codereview-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - codereview-network

networks:
  codereview-network:
    driver: bridge
